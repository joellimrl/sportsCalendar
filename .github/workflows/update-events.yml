name: Update Sports Events Data

on:
  schedule:
    - cron: '0 3 * * *'   # Daily 03:00 UTC (11:00 SGT)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch sports data
        run: node scripts/fetch-events.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "chore: auto-update sports events data"
          git push
